global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "springboot-monitoring-demo"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app:8080"]
        labels:
          application: "springboot-monitoring-demo"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
