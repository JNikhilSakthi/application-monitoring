version: "3.8"

services:
  mysql:
    image: mysql:8.0.36
    container_name: monitoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: monitoring_demo
      MYSQL_USER: monitoring_user
      MYSQL_PASSWORD: monitoring_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monitoring-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitoring-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: monitoring_demo
      DB_USERNAME: monitoring_user
      DB_PASSWORD: monitoring_pass
      SIMULATION_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: monitoring-prometheus
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: monitoring-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
